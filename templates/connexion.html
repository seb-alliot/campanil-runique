{% extends "base.html" %}

{% block title %}Connexion — U Campanile{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Connexion</h1>
        <p class="auth-sub">Accédez à votre espace client</p>

        {% messages %}

        <form method="post" action="/connexion">
            <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
            {% form.form %}
            <button type="submit" class="btn-primary btn-full">Se connecter</button>
        </form>

        <div class="auth-links">
            <p>Pas encore de compte ? <a href="/inscription">Créer un compte</a></p>
        </div>
    </div>
</div>
{% endblock %}
