<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau message — {{ nom_resto }}</title>
</head>
<body style="font-family: sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #1a1a1a;">Nouveau message de contact</h2>
    <table style="width: 100%; border-collapse: collapse;">
        <tr>
            <td style="padding: 8px 0; font-weight: bold; width: 100px;">Objet</td>
            <td style="padding: 8px 0;">{{ titre }}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; font-weight: bold;">Email</td>
            <td style="padding: 8px 0;"><a href="mailto:{{ email }}">{{ email }}</a></td>
        </tr>
    </table>
    <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
    <p style="white-space: pre-wrap;">{{ message }}</p>
    <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
    <p style="font-size: 12px; color: #999;">Message reçu via le formulaire de contact — {{ nom_resto }}</p>
</body>
</html>
