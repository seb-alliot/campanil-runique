<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Demande de devis — {{ nom_resto }}</title>
</head>
<body style="font-family: sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #1a1a1a;">Nouvelle demande de devis traiteur</h2>
    <table style="width: 100%; border-collapse: collapse;">
        <tr>
            <td style="padding: 8px 0; font-weight: bold; width: 160px;">Menu demandé</td>
            <td style="padding: 8px 0;">{{ menu_titre }}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; font-weight: bold;">Nom</td>
            <td style="padding: 8px 0;">{{ nom }}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; font-weight: bold;">Email</td>
            <td style="padding: 8px 0;"><a href="mailto:{{ email }}">{{ email }}</a></td>
        </tr>
        <tr>
            <td style="padding: 8px 0; font-weight: bold;">Téléphone</td>
            <td style="padding: 8px 0;">{{ telephone }}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; font-weight: bold;">Date de l'événement</td>
            <td style="padding: 8px 0;">{{ date_evenement }}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; font-weight: bold;">Nombre de personnes</td>
            <td style="padding: 8px 0;">{{ nb_personnes }}</td>
        </tr>
    </table>
    <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
    <p style="white-space: pre-wrap;">{{ message }}</p>
    <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
    <p style="font-size: 12px; color: #999;">Demande reçue via le formulaire de devis traiteur — {{ nom_resto }}</p>
</body>
</html>
