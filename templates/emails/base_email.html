<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}U Campanile{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f5ede0;font-family:Georgia,serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5ede0;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1);">

          <!-- Bandeau titre -->
          <tr>
            <td style="background:#5a2e0e;padding:40px 32px;text-align:center;border-radius:8px 8px 0 0;">
              <p style="margin:0 0 12px;font-size:13px;color:#e8a020;letter-spacing:.45em;text-transform:uppercase;">✦ ✦ ✦</p>
              <h1 style="margin:0 0 8px;font-size:30px;color:#e8a020;letter-spacing:.12em;font-family:Georgia,serif;">U Campanile</h1>
              <p style="margin:0;font-size:11px;color:#e8a020;letter-spacing:.35em;text-transform:uppercase;">Corte · Corse</p>
              <p style="margin:14px 0 0;font-size:11px;color:#e8a020;letter-spacing:.45em;">✦ ✦ ✦</p>
            </td>
          </tr>

          <!-- Bande orange séparatrice -->
          <tr>
            <td style="background:#d4621a;padding:5px 0;"></td>
          </tr>

          <!-- Corps -->
          <tr>
            <td style="padding:36px 40px;">
              {% block corps %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f0e6d8;padding:20px 40px;border-top:2px solid #e8924a;text-align:center;">
              <p style="margin:0;font-size:12px;color:#999;">
                U Campanile · Corte, Corse<br>
                {% block footer_msg %}{% endblock %}
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
